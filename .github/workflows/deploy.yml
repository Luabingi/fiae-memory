name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          dotnet publish FiaeMemory/FiaeMemory.csproj \
            -c Release \
            -o publish \
            --nologo \
            -p:GHPages=true \
            -p:PathBase=/$REPO_NAME

      - name: Fix base href for GitHub Pages
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          PUBLISH_DIR="publish/wwwroot"
          sed -i "s|<base href=\"/\" />|<base href=\"/$REPO_NAME/\" />|g" "$PUBLISH_DIR/index.html"
          cp "$PUBLISH_DIR/index.html" "$PUBLISH_DIR/404.html"
          touch "$PUBLISH_DIR/.nojekyll"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
